<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>وب سایت شخصی زکریا بختیاری</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Tahoma, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
        }

        .container {
            padding: 50px 20px;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        h2 {
            font-weight: normal;
            color: #00e5ff;
            margin-bottom: 40px;
        }

        .card {
            background-color: rgba(255,255,255,0.1);
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            background-color: rgba(255,255,255,0.2);
        }

        a {
            color: #00e5ff;
            text-decoration: none;
            font-size: 18px;
        }

        footer {
            margin-top: 50px;
            font-size: 14px;
            opacity: 0.8;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background-color: #00e5ff;
            color: black;
            border-radius: 30px;
            font-weight: bold;
        }

        .btn:hover {
            background-color: white;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>زکریا بختیاری</h1>
        <h2>هنرجوی رشته الکترونیک</h2>

        <div class="card">
            <h3>شماره واتساپ</h3>
            <p>09139564971</p>
            <a class="btn" href="https://wa.me/989139564971" target="_blank">ارسال پیام در واتساپ</a>
        </div>

        <div class="card">
            <h3>پیج اینستاگرام</h3>
            <a class="btn" href="https://www.instagram.com/pinrerz?igsh=MzNlNGNkZWQ4Mg==" target="_blank">
                مشاهده اینستاگرام
            </a>
        </div>

        <footer>
            © 2026 | طراحی شده توسط زکریا بختیاری
        </footer>
    </div>

</body>
</html>
